# RTX 4060 8GB RAM İçin Optimize Edilmiş LLM Model Eğitim Konfigürasyonu
# 6 Milyon Parametre - 256MB Veri Seti
#
# RTX 4060 Spesifikasyonları:
#   - VRAM: 8GB
#   - Compute Capability: 8.9
#   - Bellek kısıtlı GPU
#
# Optimizasyon Stratejisi:
#   - Batch size: 16 (bellek tasarrufu ile hız dengesi)
#   - Context length: 256 (belleği azaltmak için)
#   - Embedding dim: 256 (6M parametre hedefi)
#   - Layers: 5 (6M parametre hedefi)
#   - FF dimension: 1024 (bellek tasarrufu)

# Tokenizer ve veri dizinleri
tokenizer_path: ../tokenleştirme/kendi_tokenizerim.json
data_dir: H:/data/data_v2

# Veri parametreleri
data:
  pattern: "veriseti0001.bin"

# Model mimarisi parametreleri (6M parametre hedefi)
model:
  # Embedding boyutu: 256 (bellek kısıtlı GPU için)
  # İlk embedding boyutu + positional embedding = 256 * vocab_size + 256 * context_length
  embedding_dim: 256
  
  # Transformer katman sayısı: 5
  # Her katman: embedding_dim * (embedding_dim + ff_dim * 2) + heads kontribüsyonu
  # Toplam: ~6M parametre
  num_layers: 5
  
  # Attention head sayısı: 8
  # Embedding_dim (256) % num_heads (8) = 0 ✓
  num_heads: 8
  
  # Feed-forward iç katman: 1024
  # Bellek tasarrufu: ff_dim * 2 hesaplama yerine ff_dim * 1
  ff_dim: 1024
  
  # Context (sequence) uzunluğu: 256
  # Bellek tasarrufu: 512 yerine 256 (2x bellek azalması)
  # Dilsel bağlam yeterli
  context_length: 256
  
  # Dropout oranı: 0.2
  # Overfitting'i azaltmak için standarttan biraz daha yüksek
  dropout: 0.2

  # Ağırlık paylaşımı (Weight Tying)
  tie_weights: true

# Eğitim parametreleri (RTX 4060 8GB için)
training:
  # Epoch sayısı: 8
  # 256MB veri seti için yeterli eğitim
  # Daha fazla epoch → daha uzun eğitim süresi
  epochs: 8
  
  # Batch boyutu: 16
  # RTX 4060 8GB için optimal:
  #   - Model + gradients: ~1GB
  #   - Batch 16: ~4-5GB
  #   - Toplam: ~6-6.5GB (rahat)
  # Daha büyük batch → OOM hatası riski
  # Daha küçük batch → daha yavaş eğitim
  batch_size: 16
  
  # Learning rate: 0.0001
  # Standart transformer learning rate
  # Daha büyük batch → learning rate'i artırabilirsin
  learning_rate: 0.0001
  
  # Weight decay (L2 regularization): 0.01
  # Overfitting'i azaltmak için
  weight_decay: 0.01
  
  # Cihaz: cuda (RTX 4060)
  device: cuda

# Checkpoint ve model kayıt parametreleri
checkpoint:
  # Checkpoint kaydetme aralığı: 2 epoch
  # 256MB veri ile 2 epoch ~15-20 dakika
  # Checkpoint dosyaları ~24MB (model state)
  save_every: 2
  
  # Model çıkış yolu
  model_output_path: ./models/model_rtx4060.pt

# ============================================================================
# MEMORY ESTIMATION (RTX 4060 8GB için)
# ============================================================================
# 
# Model Parameters: 6 Milyon
#   - Model weights: 6M * 4 bytes = 24 MB
#   - Optimizer states (Adam): 2 * 24MB = 48 MB
#   - Gradients: 24 MB
#   - Buffers: ~2 MB
#   Subtotal Model Memory: ~100 MB
#
# Batch Processing (batch_size=16, context_length=256):
#   - Input embeddings: 16 * 256 * 256 * 4 = 4.2 MB
#   - Attention buffers: ~500 MB
#   - Intermediate activations: ~1 GB
#   - Loss computation: ~10 MB
#   Subtotal Batch Memory: ~2 GB
#
# TOTAL PEAK MEMORY: ~2.1 GB (8GB'ın %26'sı - Güvenli!)
#
# Headroom: 6-7GB kalan bellek
#   - OS/System: ~500 MB
#   - PyTorch overhead: ~1 GB
#   - Safe margin: ~4.5-5 GB
#
# ============================================================================
# PERFORMANCE ESTIMATION
# ============================================================================
#
# 256MB veri seti = ~128M token (uint16 format)
# Context length 256 = ~500K örnek
# Batch size 16 = ~31K batch/epoch
#
# Estimated training time (per epoch):
#   - RTX 4060: ~100-150 tokens/sec
#   - 128M token / 128 tokens/sec ≈ 1000 sec ≈ 17 dakika/epoch
#   - 8 epochs ≈ 2.3 saat
#
# Recommended fine-tuning:
#   - epoch azaltmak için: --epochs 3 --batch-size 32
#   - daha iyi accuracy için: --epochs 15 --batch-size 8 (daha yavaş)
#
# ============================================================================
# KULLANIM ÖRNEĞİ
# ============================================================================
#
# 1. Temel kullanım:
#    python train.py --config config-rtx4060.yaml
#
# 2. Batch size'ı azaltıp daha fazla epoch:
#    python train.py --config config-rtx4060.yaml --batch-size 8 --epochs 15
#
# 3. Eğitimi hızlandırmak için:
#    python train.py --config config-rtx4060.yaml --batch-size 32 --epochs 4
#    (OOM hatası alırsan batch_size'ı 16'ya geri getir)
#
# 4. Gradient accumulation ile efektif batch size'ı artırmak:
#    python train.py --config config-rtx4060.yaml --batch-size 4 --epochs 16
#    (Bu script'te gradient accumulation yok, manual olarak yapılabilir)
#
# ============================================================================
