# RTX 4060 8GB RAM İçin Optimize Edilmiş LLM Model Eğitim Konfigürasyonu
# 60 Milyon Parametre - 256MB Veri Seti
#
# RTX 4060 Spesifikasyonları:
#   - VRAM: 8GB
#   - Compute Capability: 8.9
#   - Bellek kısıtlı GPU
#
# Optimizasyon Stratejisi:
#   - Batch size: 16 (bellek tasarrufu ile hız dengesi)
#   - Context length: 256 (belleği azaltmak için)
#   - Embedding dim: 512 (60M parametre hedefi)
#   - Layers: 8 (60M parametre hedefi)
#   - FF dimension: 2048 (standart 4x embedding_dim)
#

# Tokenizer ve veri dizinleri
tokenizer_path: ../tokenleştirme/kendi_tokenizerim.json
data_dir: H:/data/data_v2

# Veri parametreleri
data:
  pattern: "veriseti000*.bin"

# Model mimarisi parametreleri (60M parametre hedefi)
model:
  # Embedding boyutu: 512
  # İlk embedding boyutu + positional embedding = 512 * vocab_size + 512 * context_length
  embedding_dim: 512
  
  # Transformer katman sayısı: 8
  # Her katman: embedding_dim * (embedding_dim + ff_dim * 2) + heads kontribüsyonu
  # Toplam: ~59M parametre
  num_layers: 8
  
  # Attention head sayısı: 8
  # Embedding_dim (512) % num_heads (8) = 0 ✓
  num_heads: 8
  
  # Feed-forward iç katman: 2048
  # Standart Transformer tasarımı (4 * embedding_dim)
  ff_dim: 2048
  
  # Context (sequence) uzunluğu: 256
  # Bellek tasarrufu: 512 yerine 256 (2x bellek azalması)
  # Dilsel bağlam yeterli, VRAM kullanımı açısından optimal
  context_length: 256
  
  # Dropout oranı: 0.1
  # Model boyutu büyüdüğü için overfitting'i engellemek adına standart değer
  dropout: 0.1

  # Ağırlık paylaşımı (Weight Tying)
  tie_weights: true

# Eğitim parametreleri (RTX 4060 8GB için)
training:
  # Epoch sayısı: 8
  # 256MB veri seti için yeterli eğitim
  # Daha fazla epoch → daha uzun eğitim süresi
  epochs: 8
  
  # Batch boyutu: 16
  # RTX 4060 8GB için optimal:
  #   - Model + gradients: ~1GB
  #   - Batch 16: ~2.4GB
  #   - Toplam: ~3.4GB (rahat)
  # Daha büyük batch → OOM hatası riski
  # Daha küçük batch → daha yavaş eğitim
  batch_size: 16
  
  # Learning rate: 0.0001
  # Standart transformer learning rate
  learning_rate: 0.0001
  
  # Weight decay (L2 regularization): 0.01
  # Overfitting'i azaltmak için
  weight_decay: 0.01
  
  # Cihaz: cuda (RTX 4060)
  device: cuda

# Checkpoint ve model kayıt parametreleri
checkpoint:
  # Checkpoint kaydetme aralığı: 2 epoch
  save_every: 2
  
  # Model çıkış yolu (60M model olduğunu belirtmek için güncellendi)
  model_output_path: ./models/model_rtx4060_60m.pt

# ============================================================================
# MEMORY ESTIMATION (RTX 4060 8GB için)
# ============================================================================
# 
# Model Parameters: ~59 Milyon (58,969,599)
#   - Model weights: 59M * 4 bytes = 236 MB
#   - Optimizer states (Adam): 2 * 236MB = 472 MB
#   - Gradients: 236 MB
#   - Buffers: ~10 MB
#   Subtotal Model Memory: ~954 MB (~1 GB)
#
# Batch Processing (batch_size=16, context_length=256):
#   - Input embeddings: 16 * 256 * 512 * 4 = 8.4 MB
#   - Attention buffers: ~600 MB
#   - Intermediate activations: ~1.8 GB
#   - Loss computation: ~10 MB
#   Subtotal Batch Memory: ~2.4 GB
#
# TOTAL PEAK MEMORY: ~3.4 GB (8GB'ın %43'ü - Güvenli!)
#
# Headroom: 4-5GB kalan bellek
#   - OS/System: ~500 MB
#   - PyTorch overhead: ~1.5 GB
#   - Safe margin: ~2-3 GB
#
# ============================================================================
# PERFORMANCE ESTIMATION
# ============================================================================
#
# 256MB veri seti = ~128M token (uint16 format)
# Context length 256 = ~500K örnek
# Batch size 16 = ~31K batch/epoch
#
# Estimated training time (per epoch):
#   - RTX 4060: ~30-50 tokens/sec
#   - 128M token / 40 tokens/sec ≈ 3200 sec ≈ 53 dakika/epoch
#   - 8 epochs ≈ 7 saat
#
# Recommended fine-tuning:
#   - epoch azaltmak için: --epochs 3 --batch-size 32
#   - daha iyi accuracy için: --epochs 15 --batch-size 8 (daha yavaş)
#
# ============================================================================
# KULLANIM ÖRNEĞİ
# ============================================================================
#
# 1. Temel kullanım:
#    python train.py --config config-rtx4060_60m.yaml
#
# 2. Batch size'ı azaltıp daha fazla epoch:
#    python train.py --config config-rtx4060_60m.yaml --batch-size 8 --epochs 15
#
# 3. Eğitimi hızlandırmak için:
#    python train.py --config config-rtx4060_60m.yaml --batch-size 32 --epochs 4
#    (OOM hatası alırsan batch_size'ı 16'ya geri getir)
#
# ============================================================================
